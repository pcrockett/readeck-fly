# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: Deploy

on:
  schedule:
    - cron: "29 2 * * 1"  # every Sunday at 02:29 UTC <https://crontab.guru/#29_2_*_*_0>
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5
    - name: flyctl deploy
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_DEPLOY_TOKEN }}
        HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
      run: |
        test "${HEALTHCHECK_URL:-}" = "" || curl "${HEALTHCHECK_URL}/start"
        for _ in 1 2; do
          flyctl deploy \
            --app "${{ secrets.FLY_APP }}" \
            --config fly.template.toml \
            --remote-only \
            && break  # break from `for` loop if successful
          sleep 60  # sleep for 1 minute if failed
        done
        test "${HEALTHCHECK_URL:-}" = "" || curl "${HEALTHCHECK_URL}"
